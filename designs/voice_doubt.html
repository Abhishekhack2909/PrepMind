<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        
        .pulse-ring {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: .5;
                transform: scale(1.1);
            }
        }

        .mic-listening .pulse-ring {
            animation: pulse-active 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-active {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 99, 153, 0.7);
            }
            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 15px rgba(0, 99, 153, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 99, 153, 0);
            }
        }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col relative md:hidden">
<!-- Top Navigation (Transactional style, no bottom nav needed) -->
<header class="flex justify-between items-center px-margin-mobile py-md w-full z-10 sticky top-0 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex items-center gap-2 bg-secondary-fixed text-on-secondary-fixed px-3 py-1.5 rounded-full">
<span class="font-body-sm text-body-sm">1/2 queries left today</span>
<span class="font-label-md text-label-md text-secondary font-bold flex items-center gap-1 cursor-pointer hover:underline">
                Upgrade <span class="material-symbols-outlined text-[16px]" data-icon="bolt">bolt</span>
</span>
</div>
<button aria-label="Menu" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile pb-32 pt-8 relative">
<!-- Central AI Branding -->
<div class="flex flex-col items-center mb-12">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center mb-4 shadow-soft">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="science">science</span>
</div>
<h1 class="font-headline-sm text-headline-sm text-primary">Ask PrepMind</h1>
</div>
<!-- Chat Area (Visible when active) -->
<div class="w-full max-w-md flex flex-col gap-4 opacity-0 transition-opacity duration-500 hidden mb-8" id="chatContainer">
<!-- User Query -->
<div class="self-end bg-surface-container-high text-on-surface px-4 py-3 rounded-2xl rounded-tr-sm max-w-[85%] shadow-sm border border-outline-variant/10">
<p class="font-body-md text-body-md" id="userTranscribedText">What is the significance of the Dandi March?</p>
</div>
<!-- AI Response -->
<div class="self-start bg-surface-container-lowest text-on-surface px-4 py-3 rounded-2xl rounded-tl-sm max-w-[90%] shadow-soft border border-outline-variant/10 relative">
<div class="absolute -left-3 -top-3 w-8 h-8 rounded-full bg-primary flex items-center justify-center border-2 border-surface">
<span class="material-symbols-outlined text-on-primary text-[16px]" data-icon="robot_2">robot_2</span>
</div>
<div class="pl-2 pt-2">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-2" id="aiResponseText">The Dandi March, led by Mahatma Gandhi in 1930, was a pivotal moment in the Indian independence movement. It marked the beginning of the Civil Disobedience Movement...</p>
<div class="flex gap-2 mt-3">
<button class="px-3 py-1 rounded-full bg-surface-container border border-outline-variant/20 font-label-md text-label-md text-primary flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="volume_up">volume_up</span> Read Aloud
                        </button>
</div>
</div>
</div>
</div>
<!-- Suggestion Chips -->
<div class="flex flex-wrap justify-center gap-3 w-full max-w-md absolute bottom-24 left-1/2 -translate-x-1/2 px-margin-mobile" id="suggestionChips">
<button class="bg-surface-container-lowest border border-outline-variant/20 px-4 py-2 rounded-full flex items-center gap-2 shadow-sm hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-secondary" data-icon="tips_and_updates">tips_and_updates</span>
<span class="font-body-sm text-body-sm text-on-surface">Prep strategy</span>
</button>
<button class="bg-surface-container-lowest border border-outline-variant/20 px-4 py-2 rounded-full flex items-center gap-2 shadow-sm hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary" data-icon="menu_book">menu_book</span>
<span class="font-body-sm text-body-sm text-on-surface">Study Topics</span>
</button>
</div>
</main>
<!-- Bottom Input Area (Sticky) -->
<div class="fixed bottom-0 left-0 w-full bg-surface px-margin-mobile py-4 pb-8 z-20">
<div class="w-full max-w-md mx-auto relative">
<div class="absolute -top-1 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-gradient-to-r from-transparent via-primary to-transparent rounded-t-full opacity-50"></div>
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-full flex items-center p-1.5 shadow-soft">
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 px-4 py-2" id="textInput" placeholder="Try asking by voice..." type="text"/>
<div class="flex items-center gap-1 pr-1">
<button aria-label="Use Microphone" class="w-10 h-10 rounded-full flex items-center justify-center text-primary hover:bg-surface-container transition-colors relative" id="micBtn">
<div class="absolute inset-0 rounded-full bg-primary/10 pulse-ring"></div>
<span class="material-symbols-outlined relative z-10" data-icon="mic">mic</span>
</button>
<button aria-label="Send" class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-sm hover:opacity-90 transition-opacity active:scale-95" id="sendBtn">
<span class="material-symbols-outlined" data-icon="arrow_upward">arrow_upward</span>
</button>
</div>
</div>
</div>
<!-- Home Indicator Area -->
<div class="w-full flex justify-center mt-6">
<div class="w-1/3 h-1 bg-outline-variant/30 rounded-full"></div>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const micBtn = document.getElementById('micBtn');
            const textInput = document.getElementById('textInput');
            const chatContainer = document.getElementById('chatContainer');
            const suggestionChips = document.getElementById('suggestionChips');
            
            let isListening = false;

            // Simulate mic interaction
            micBtn.addEventListener('click', () => {
                isListening = !isListening;
                if (isListening) {
                    micBtn.parentElement.classList.add('mic-listening');
                    micBtn.classList.replace('text-primary', 'text-error');
                    textInput.placeholder = "Listening...";
                } else {
                    micBtn.parentElement.classList.remove('mic-listening');
                    micBtn.classList.replace('text-error', 'text-primary');
                    textInput.placeholder = "Try asking by voice...";
                    
                    // Simulate receiving text after speaking
                    setTimeout(() => {
                        textInput.value = "What is the significance of the Dandi March?";
                        simulateSend();
                    }, 500);
                }
            });

            function simulateSend() {
                if (textInput.value.trim() === '') return;
                
                // Hide suggestions, show chat
                suggestionChips.style.opacity = '0';
                setTimeout(() => {
                    suggestionChips.classList.add('hidden');
                    chatContainer.classList.remove('hidden');
                    
                    // Small delay to allow display:block to apply before animating opacity
                    requestAnimationFrame(() => {
                        chatContainer.style.opacity = '1';
                    });
                }, 300);

                // Clear input after a short delay
                setTimeout(() => {
                    textInput.value = '';
                }, 1000);
            }

            document.getElementById('sendBtn').addEventListener('click', simulateSend);
            
            textInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') simulateSend();
            });
        });
    </script>
</body></html>
