services:
  - type: web
    name: prepmind-backend
    runtime: python
    region: singapore   # closest to India — change to oregon/frankfurt if needed
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GEMINI_API_KEY
        sync: false          # you'll paste value in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
